<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login — HREI</title>
  <link rel="icon" type="image/jpeg" href="assets/hrei-logo.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#0B5C63', dark: '#073C40', accent: '#F59E0B' }
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }

    .login-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #073C40 0%, #0B5C63 60%, #0e7a84 100%);
      position: relative;
      overflow: hidden;
    }

    .login-bg::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(245,158,11,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(255,255,255,0.04) 0%, transparent 40%);
      pointer-events: none;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      outline: none;
      background: #f8fafc;
    }

    .input-field:focus {
      border-color: #0B5C63;
      background: white;
      box-shadow: 0 0 0 4px rgba(11,92,99,0.1);
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: #0B5C63;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(11,92,99,0.3);
    }

    .btn-primary:hover {
      background: #073C40;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(11,92,99,0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      width: 100%;
      padding: 15px;
      background: transparent;
      color: #0B5C63;
      border: 2px solid #0B5C63;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: #0B5C63;
      color: white;
      transform: translateY(-2px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }

    .floating-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.06;
      background: white;
      pointer-events: none;
    }

    .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,0.15);
      color: #F59E0B;
      border: 1px solid rgba(245,158,11,0.3);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="login-bg flex items-center justify-center px-4 py-12">

    <!-- Decorative floating shapes -->
    <div class="floating-shape" style="width:400px;height:400px;top:-100px;right:-100px;"></div>
    <div class="floating-shape" style="width:250px;height:250px;bottom:-50px;left:-80px;"></div>
    <div class="floating-shape" style="width:150px;height:150px;top:40%;left:5%;"></div>

    <div class="login-card w-full max-w-md p-10 relative z-10">

      <!-- Logo & Header -->
      <div class="text-center mb-8">
        <a href="/">
          <img src="assets/hrei-logo.jpg" alt="HREI Logo" class="h-16 w-auto mx-auto rounded-xl shadow-md mb-4">
        </a>
        <div class="flex justify-center mb-3">
          <span class="badge-pill">🔐 Members Only</span>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-800">Welcome Back</h1>
        <p class="text-slate-500 mt-2">Sign in to access your HREI dashboard</p>
      </div>

      <!-- Error / Success Messages -->
      <div id="errorMsg" class="error-msg mb-4"></div>
      <div id="successMsg" class="success-msg mb-4"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
          <input
            id="email"
            type="email"
            class="input-field"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-semibold text-slate-700">Password</label>
            <a href="#" onclick="handleForgotPassword()" class="text-sm text-brand hover:text-brand-dark font-semibold transition">Forgot password?</a>
          </div>
          <div class="relative">
            <input
              id="password"
              type="password"
              class="input-field pr-12"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button
              type="button"
              onclick="togglePassword()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition"
            >
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button type="submit" id="loginBtn" class="btn-primary mb-4">
          <span id="loginBtnText">Sign In →</span>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider my-5">or</div>

      <!-- Create Account -->
      <button onclick="handleSignup()" id="signupBtn" class="btn-secondary mb-6">
        Create an Account
      </button>

      <!-- Back to Site -->
      <div class="text-center">
        <a href="/" class="text-sm text-slate-500 hover:text-brand transition font-medium">
          ← Back to HREI Website
        </a>
      </div>

      <!-- Trust Badges -->
      <div class="mt-8 pt-6 border-t border-slate-100 flex justify-center gap-6 text-xs text-slate-400">
        <span class="flex items-center gap-1">🔒 Secure Login</span>
        <span class="flex items-center gap-1">🛡️ Data Protected</span>
        <span class="flex items-center gap-1">✅ Members Only</span>
      </div>

    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';
    const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Show/hide messages
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      const text = document.getElementById('loginBtnText');
      btn.disabled = loading;
      text.textContent = loading ? 'Signing in...' : 'Sign In →';
      btn.style.opacity = loading ? '0.7' : '1';
    }

    // Login handler
    window.handleLogin = async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      setLoading(true);

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message || 'Login failed. Please check your credentials.');
        setLoading(false);
        return;
      }

      showSuccess('Login successful! Redirecting...');
      setTimeout(() => { window.location.href = '/members/index.html'; }, 1000);
    };

    // Signup handler
    window.handleSignup = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and a password to create an account.');
        return;
      }

      setLoading(true);

      const { data, error } = await _supabase.auth.signUp({ email, password });

      if (error) {
        showError(error.message || 'Signup failed. Please try again.');
        setLoading(false);
        return;
      }

      showSuccess('Account created! Please check your email to confirm your account.');
      setLoading(false);
    };

    // Forgot password handler
    window.handleForgotPassword = async function() {
      const email = document.getElementById('email').value.trim();

      if (!email) {
        showError('Please enter your email address first.');
        return;
      }

      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });

      if (error) {
        showError(error.message);
        return;
      }

      showSuccess('Password reset email sent! Check your inbox.');
    };

    // Toggle password visibility
    window.togglePassword = function() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    // Check if already logged in
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
      window.location.href = '/members/index.html';
    }
  </script>

</body>
</html>
